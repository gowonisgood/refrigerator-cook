goal: >
  사용자가 보유한 재료를 입력하면 LangGraph ReAct 패턴을 활용하여
  요리 레시피를 추천해주는 AI Agent를 Streamlit으로 구현한다.
  TheMealDB API로 먼저 레시피를 검색하고, 결과가 없을 경우 LLM이 직접
  레시피를 생성하는 분기 워크플로우를 포함한다.

constraints:
  - Python >= 3.10
  - LangGraph + LangChain 기반 ReAct Agent
  - LLM: gpt-4o-mini (OpenAI API, .env의 OPENAI_API_KEY 사용)
  - 무료 API만 사용: TheMealDB (완전 무료), Open Food Facts (완전 무료), Tavily Search (무료 플랜 월 1,000회)
  - Streamlit으로 UI 구현, Streamlit Cloud 배포 가능 구조
  - 모든 UI 및 레시피 출력은 한국어
  - 알레르기/거부 재료 필터링 기능 포함
  - 비용 최소화: 외부 유료 DB 또는 유료 API 사용 불가

acceptance_criteria:
  - 재료를 텍스트 자유 입력 또는 드롭다운/체크박스로 선택할 수 있다
  - 알레르기/거부 재료를 선택하면 추천 레시피에서 해당 재료가 제외된다
  - Agent가 TheMealDB API로 레시피를 먼저 검색한다
  - TheMealDB에서 결과가 없을 경우 LLM이 직접 레시피를 생성하는 분기가 동작한다
  - 최종 출력에 레시피명, 재료 목록, 조리 순서, 영양 정보, 조리 시간이 모두 포함된다
  - Streamlit UI에서 Agent 실행 단계(Thought/Action/Observation)가 실시간으로 표시된다
  - 영양 정보는 Open Food Facts API 또는 LLM 추정값으로 제공된다
  - Streamlit Cloud에 requirements.txt 기반으로 배포 가능하다

non_goals:
  - 이미지 업로드로 재료를 인식하는 OCR/비전 기능
  - 사용자 계정 관리, 로그인, 레시피 즐겨찾기 저장
  - 냉장고 재고 DB 관리 (재료 추가/삭제/만료일 추적)
  - 실시간 마켓 가격 조회 또는 쇼핑 연동
  - 다국어 지원 (한국어 단일 언어로 고정)

ontology_schema:
  name: RecipeRecommendationAgent
  description: 재료 입력 기반 요리 추천 AI Agent의 핵심 도메인 모델
  entities:
    - name: UserInput
      description: 사용자가 입력하는 재료 및 식이 조건
      fields:
        - name: ingredients
          type: List[str]
          description: 보유 재료 목록 (예: ["당근", "계란", "밀가루"])
        - name: excluded_ingredients
          type: List[str]
          description: 알레르기 또는 거부 재료 목록
    - name: RecipeResult
      description: Agent가 최종 출력하는 레시피 추천 결과
      fields:
        - name: recipe_name
          type: str
          description: 추천 요리 이름
        - name: recipe_ingredients
          type: List[str]
          description: 요리에 필요한 재료 목록
        - name: cooking_steps
          type: List[str]
          description: 단계별 조리 순서
        - name: nutrition
          type: NutritionInfo
          description: 영양 정보 (칼로리, 단백질, 탄수화물, 지방)
        - name: cooking_time
          type: CookingTime
          description: 준비 시간 + 조리 시간
        - name: source
          type: str
          description: '"TheMealDB" | "LLM_Generated" — 레시피 출처'
    - name: NutritionInfo
      description: 영양 성분 정보
      fields:
        - name: calories
          type: float
          description: 칼로리 (kcal)
        - name: protein_g
          type: float
          description: 단백질 (g)
        - name: carbs_g
          type: float
          description: 탄수화물 (g)
        - name: fat_g
          type: float
          description: 지방 (g)
    - name: CookingTime
      description: 조리 소요 시간
      fields:
        - name: prep_minutes
          type: int
          description: 재료 준비 시간 (분)
        - name: cook_minutes
          type: int
          description: 실제 조리 시간 (분)

agent_workflow:
  pattern: ReAct (Reasoning + Acting)
  framework: LangGraph create_react_agent
  tools:
    - name: search_mealdb
      description: TheMealDB API로 재료 기반 레시피 검색
      api: "https://www.themealdb.com/api/json/v1/1/filter.php?i={ingredient}"
      free: true
    - name: get_nutrition_info
      description: Open Food Facts API로 재료별 영양 정보 조회
      api: "https://world.openfoodfacts.org/cgi/search.pl"
      free: true
    - name: search_web_recipe
      description: Tavily Search로 실시간 웹 레시피 검색 (TheMealDB 실패 시 보조)
      api: Tavily Search API
      free: "무료 플랜 월 1,000회"
    - name: generate_recipe_with_llm
      description: LLM 내부 지식으로 레시피 직접 생성 (TheMealDB 검색 실패 시 폴백)
      api: OpenAI gpt-4o-mini
      free: false
  branching:
    condition: TheMealDB 검색 결과 존재 여부
    branch_found: TheMealDB 결과 → 영양 정보 조회 → 최종 출력
    branch_not_found: LLM 직접 레시피 생성 → 최종 출력

evaluation_principles:
  - name: correctness
    description: 분기 로직이 올바르게 동작하는가 (TheMealDB 성공/실패 분기)
    weight: 0.4
  - name: completeness
    description: 모든 수용 기준(재료 입력, 필터링, 출력 형식, 실시간 표시)이 구현되었는가
    weight: 0.35
  - name: quality
    description: 코드 구조, Streamlit Cloud 배포 가능성, 한국어 출력 품질
    weight: 0.25

exit_conditions:
  - 모든 수용 기준이 통과됨
  - TheMealDB 성공/실패 양쪽 분기가 실제로 동작함
  - Streamlit UI에서 Agent 단계 실시간 표시가 확인됨
  - requirements.txt 기반 Streamlit Cloud 배포가 성공함
  - 알레르기 필터링이 레시피 출력에 반영됨

